services:
  db:
    image: postgres:16-alpine
    container_name: spendwise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spendwise
      POSTGRES_PASSWORD: spendwise
      POSTGRES_DB: spendwise
    ports:
      - "5432:5432"
    volumes:
      - spendwise_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spendwise_pgdata:
